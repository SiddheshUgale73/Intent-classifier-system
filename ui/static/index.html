<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Intent & Entity Extraction</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-gradient"></div>
    
    <div class="container">
        <header>
            <div class="logo">🏦</div>
            <h1>Smart Banking Assistant</h1>
            <p>Enter your request below to analyze intent and extract data.</p>
        </header>

        <main>
            <div class="input-section">
                <textarea id="userInput" placeholder="e.g. transfer 500 to Rahul and show balance..."></textarea>
                <button id="analyzeBtn">Analyze Query</button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing multi-intent patterns...</p>
            </div>

            <div id="resultSection" class="hidden">
                <!-- Result Cards will be dynamically injected here -->
            </div>
        </main>

        <footer>
            <p>v1.2.0 | Advanced Multi-Intent & Explainability Engine</p>
        </footer>
    </div>

    <!-- Template for Result Card -->
    <template id="intentCardTemplate">
        <div class="card result-card">
            <div class="result-header">
                <h3 class="action-number">Action #1</h3>
                <span class="intent-badge badge">---</span>
            </div>
            
            <div class="metrics">
                <div class="metric">
                    <label>Confidence Score</label>
                    <div class="progress-bar">
                        <div class="confidence-fill fill"></div>
                    </div>
                    <span class="confidence-text">0%</span>
                </div>
            </div>

            <div class="reasoning-strategy">
                <div class="reasoning-box">
                    <strong>📖 Meaning</strong>
                    <p class="intent-description">Calculating intent context...</p>
                </div>
                <div class="strategy-box">
                    <strong>🛠️ Common Approaches</strong>
                    <ul class="approaches-list"></ul>
                </div>
            </div>

            <div class="entities hidden">
                <h4>🏷️ Extracted Data</h4>
                <div class="entity-grid">
                    <!-- Entity items will be injected here -->
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
