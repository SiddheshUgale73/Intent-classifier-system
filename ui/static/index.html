<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Intelligence | Banking Intent Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-gradient"></div>
    
    <div class="container">
        <header>
            <div class="logo-wrapper">🏦</div>
            <h1>Banking Intent Engine</h1>
            <p>High-performance neural analysis for fintech intent decomposition and entity extraction.</p>
        </header>

        <main>
            <div class="stats-bar">
                <div class="status-indicator">
                    <span class="dot"></span>
                    <span>System Active • v1.5.2</span>
                </div>
                <div class="engine-info">Logistic-XAI Enabled</div>
            </div>

            <div class="input-section">
                <textarea id="userInput" placeholder="E.g., Transfer 500 to Sarah and check my balance..."></textarea>
                
                <div class="sample-bar">
                    <span class="sample-chip" data-text="Transfer 1200 to Rahul and show my balance">Transfer & Balance</span>
                    <span class="sample-chip" data-text="I lost my card, please block it immediately">Lost Card</span>
                    <span class="sample-chip" data-text="Show me the last 5 transactions">History</span>
                    <span class="sample-chip" data-text="Reset my transaction pin for the debit card">Reset PIN</span>
                </div>

                <div class="actions">
                    <button id="analyzeBtn">Analyze Intelligence</button>
                </div>
            </div>

            <div id="loading" class="hidden">
                <div class="aura-loader"></div>
                <p style="color: var(--text-secondary)">Decomposing semantic patterns...</p>
            </div>

            <div id="resultSection" class="hidden">
                <!-- Advanced Result Cards -->
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Agentic Banking Assistant. All rights reserved.</p>
        </footer>
    </div>

    <!-- Enhanced Template for Result Card -->
    <template id="intentCardTemplate">
        <div class="result-card">
            <div class="result-header">
                <span class="action-label">Task Analysis</span>
                <span class="intent-badge">---</span>
            </div>
            
            <div class="confidence-meter">
                <div class="meter-header">
                    <span>Classification Confidence</span>
                    <span class="confidence-val">0%</span>
                </div>
                <div class="meter-track">
                    <div class="meter-fill"></div>
                </div>
            </div>

            <div class="content-grid">
                <div class="info-box">
                    <h4>📖 Core Context</h4>
                    <p class="intent-description">Decrypting intent meaning...</p>
                </div>
                <div class="info-box">
                    <h4>🛠️ Strategy Execution</h4>
                    <ul class="approaches-list"></ul>
                </div>
            </div>

            <div class="entities-section hidden">
                <h4>🏷️ Knowledge Entities</h4>
                <div class="entities-grid"></div>
            </div>

            <div class="proactive-banner hidden">
                <span class="suggestion-icon">💡</span>
                <div class="suggestion-body">
                    <strong>Proactive Intelligence</strong>
                    <p class="suggestion-text"></p>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
